services:
  db:
    image: postgres:15-alpine
    container_name: pitagora_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: p1234
      POSTGRES_DB: sgp_db
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: pitagora_backend
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sgp_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: p1234
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: pitagora_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    stdin_open: true
    depends_on:
      - backend