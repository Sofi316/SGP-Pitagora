services:
  backend:
    build: ./backend
    container_name: pitagora_backend
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: pitagora_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    stdin_open: true
    depends_on:
      - backend