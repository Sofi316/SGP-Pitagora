services:
  backend:
    build: ./backend
    container_name: pitagora_backend
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    environment:
    - MAIL_USERNAME=${MAIL_USERNAME}
    - MAIL_PASSWORD=${MAIL_PASSWORD}
    - MAIL_IMAP_HOST=imap.gmail.com
    - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    - SUPABASE_URL=${SUPABASE_URL}
    - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}

  frontend:
    build: ./frontend
    container_name: pitagora_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    stdin_open: true
    depends_on:
      - backend