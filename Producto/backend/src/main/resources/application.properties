spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Seguridad JWT
application.security.jwt.secret-key=${JWT_SECRET_KEY}

# Variables para el DataInitializer
ADMIN_INIT_EMAIL=${ADMIN_INIT_EMAIL}
ADMIN_INIT_PASSWORD=${ADMIN_INIT_PASSWORD}
ADMIN_INIT_RUT=${ADMIN_INIT_RUT}

# Configuración de Envío de Correo (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Configuración de Lectura de Correo (IMAP)
mail.imap.host=imap.gmail.com
mail.imap.port=993
mail.imap.protocol=imaps

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_SERVICE_KEY}

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
